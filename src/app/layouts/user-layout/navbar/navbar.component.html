>

    <i class="fa-solid fa-bars"></i>
  </button>

  <div class="flex items-center gap-3">
    <div class="hidden sm:text-end sm:block">
      <h3 class="text-sm font-semibold">{{ userName() }}</h3>

      <p class="text-xs text-gray-500">{{ userTitle() }}</p>
    </div>

    <div
      class="flex h-10 w-10 items-center justify-center rounded-lg bg-primary text-white font-semibold"
    >
      {{ userInitials() }}
    </div>
  </div>
