<section
  class="container m-auto flex flex-col items-center justify-center md:pb-12"
>
  <div
    class="md:bg-white max-w-xl px-6 md:p-12 rounded-lg md:shadow-md flex flex-col gap-6"
  >
    <div class="flex flex-col md:items-center gap-2">
      <h2 class="text-3xl font-semibold text-dark-grey">Welcome Back</h2>
      <p class="text-grey text-body-14">
        Please enter your details to access your workspace
      </p>
    </div>

    <div class="pb-4">
      <form [formGroup]="authForm" (ngSubmit)="onSubmit()">
        <div class="flex flex-col gap-6">
          <div>
            <label
              for="email"
              class="font-bold text-dark-grey text-label uppercase tracking-wider"
            >
              Email
            </label>
            <input
              formControlName="email"
              id="email"
              name="email"
              type="email"
              class="bg-surface-high mt-1 block w-full p-form-valid-x p-form-valid-y rounded-sm shadow-sm focus:outline-none focus:shadow-main/44 focus:shadow-md"
              placeholder="youremail@company.com"
            />
          </div>

          <div>
            <label
              for="password"
              class="font-bold text-dark-grey text-label uppercase tracking-wider"
            >
              Password
            </label>
            <input
              formControlName="password"
              id="password"
              name="password"
              type="password"
              class="bg-surface-high mt-1 block w-full p-form-valid-x p-form-valid-y rounded-sm shadow-sm focus:outline-none focus:shadow-main/44 focus:shadow-md"
              placeholder="Password"
            />
          </div>

          <div class="flex items-center justify-between">
            <label class="flex items-center gap-2 text-sm text-dark-grey">
              <input
                type="checkbox"
                formControlName="rememberMe"
                class="h-4 w-4 rounded-xs border-border-light bg-surface-low accent-primary"
              />

              <span>Remember me</span>
            </label>
            <a class="text-primary"> Forgot Password? </a>
          </div>

          <div>
            <button
              class="bg-primary-gradient shadow-card w-full text-white font-semibold py-button-y px-button-x rounded-lg cursor-pointer"
            >
              Log In
            </button>
          </div>
        </div>

        @if (errorMessage) {
          <div
            class="text-error bg-warning-container w-full p-form-error-x p-form-error-y rounded-sm shadow-sm mt-2"
          >
            {{ errorMessage }}
          </div>
        }
      </form>
      <div class="pt-8">
        <p class="text-grey text-body-14 text-center">
          Don't have an account?
          <a
            routerLink="/sign-up"
            class="text-primary font-semibold hover:underline"
            >Sign Up</a
          >
        </p>
      </div>
    </div>
  </div>
</section>
